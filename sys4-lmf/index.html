<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>算力计费结算管理系统</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <!-- 左侧导航栏 -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">KG</div>
        <div>
          <h1>算力运营管理平台</h1>
          <p>Finance Operation System</p>
        </div>
      </div>

      <nav class="nav-menu">
        <button class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          财务运营驾驶舱
        </button>
        <button class="nav-item" data-page="rules">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          计费规则管理
        </button>
        <button class="nav-item" data-page="autoBilling">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          自动计费模块
        </button>
        <button class="nav-item" data-page="bills">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="15" y2="15"></line>
          </svg>
          账单管理
        </button>
        <button class="nav-item" data-page="settlement">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"></rect>
            <line x1="2" y1="10" x2="22" y2="10"></line>
          </svg>
          结算管理
        </button>
        <button class="nav-item" data-page="invoice">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
          发票管理
        </button>
        <button class="nav-item" data-page="revenue">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"></line>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
          营收统计分析
        </button>
        <button class="nav-item" data-page="refund">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          退款管理
        </button>
        <button class="nav-item" data-page="permission">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          财务权限管理
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span>财务服务运行正常</span>
      </div>
    </aside>

    <!-- 主内容区域 -->
    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">财务运营驾驶舱</h2>
          <p id="pageDesc">实现算力租赁全流程计费、结算、对账与营收统计。</p>
        </div>

        <div class="top-actions">
          <div class="search-box">
            <input id="globalSearch" type="text" placeholder="搜索客户、账单、发票、退款单..." />
            <button id="searchBtn">搜索</button>
          </div>
          <button class="ghost-btn" id="exportBtn">导出报表</button>
          <div class="user-chip">
            <span>财务管理员</span>
            <div class="avatar">A</div>
          </div>
        </div>
      </header>

      <section id="content" class="content"></section>
    </main>
  </div>

  <!-- 弹窗 -->
  <div id="modalMask" class="modal-mask">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">操作确认</h3>
        <button id="closeModal">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-footer">
        <button class="ghost-btn" id="cancelModal">取消</button>
        <button class="primary-btn" id="confirmModal">确认</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
